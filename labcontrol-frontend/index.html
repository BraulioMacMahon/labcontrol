<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LabControl | Infrastructure Management</title>
    <link rel="shortcut icon" href="img/logo_imetro.png" type="image/x-icon">
    <link rel="stylesheet" href="vendor/output.css">
    <link rel="stylesheet" href="vendor/fonts.css">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #050505;
            color: #e2e8f0;
        }
        
        .glass-panel {
            background: rgba(15, 15, 15, 0.75);
            backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: all 0.4s ease;
        }
        
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(59, 130, 246, 0.3);
            transform: translateY(-4px);
        }
        
        .active-nav {
            background: linear-gradient(90deg, rgba(59, 130, 246, 0.15) 0%, transparent 100%);
            color: #60a5fa !important;
        }
        
        .active-nav::before {
            content: '';
            position: absolute;
            left: 0;
            top: 20%;
            height: 60%;
            width: 3px;
            background: #60a5fa;
            border-radius: 0 4px 4px 0;
        }
        
        .animate-slide-in {
            animation: slideIn 0.4s ease-out;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(100%); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .animate-slide-out {
            animation: slideOut 0.3s ease-in forwards;
        }
        
        @keyframes slideOut {
            from { opacity: 1; transform: translateX(0); }
            to { opacity: 0; transform: translateX(150%); }
        }
        
        .animate-float {
            animation: float 6s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-20px); }
        }
        
        .fade-in-up {
            animation: fadeInUp 0.8s ease both;
        }
        
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .custom-scrollbar::-webkit-scrollbar {
            width: 5px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
        }
        
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(59, 130, 246, 0.4);
        }
        
        .nav-link {
            position: relative;
        }
    </style>
</head>
<body class="antialiased overflow-hidden">
    <!-- Auth Overlay -->
    <div id="auth-overlay" class="fixed inset-0 z-[200] bg-[#050505] flex items-center justify-center transition-all duration-700"></div>

    <!-- Mobile Overlay -->
    <div id="sidebar-overlay" class="fixed inset-0 bg-black/80 backdrop-blur-xl z-[45] hidden transition-opacity duration-500"></div>

    <div id="app" class="flex h-screen w-full opacity-0 transition-opacity duration-700">
        <!-- Sidebar -->
        <aside id="sidebar" class="fixed lg:static inset-y-0 left-0 w-80 glass-panel flex flex-col transition-transform duration-500 -translate-x-full lg:translate-x-0 z-50 shadow-[40px_0_100px_rgba(0,0,0,0.5)] lg:shadow-none rounded-r-[2rem] lg:rounded-none">
            <div class="p-8 flex items-center justify-between">
                <div class="flex items-center gap-4 cursor-pointer group" data-nav="dashboard">
                    <div class="w-10 h-10 bg-gradient-to-br from-blue-600 to-indigo-700 rounded-xl flex items-center justify-center shadow-lg shadow-blue-500/30 group-hover:scale-110 transition-transform">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    </div>
                    <div>
                        <h1 class="font-extrabold text-xl tracking-tight text-white leading-none">LabControl</h1>
                        <span class="text-[9px] font-black text-blue-500/80 uppercase tracking-[0.3em]">PRO</span>
                    </div>
                </div>
                <button id="close-sidebar" class="lg:hidden p-2 text-gray-500 hover:text-white bg-white/5 rounded-xl">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>
            
            <nav class="px-4 py-2 space-y-2">
                <button data-nav="dashboard" class="nav-link w-full flex items-center gap-4 p-4 rounded-2xl transition-all text-gray-400 font-bold relative active-nav">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span class="text-sm">Dashboard</span>
                </button>
                <button data-nav="audit" class="nav-link w-full flex items-center gap-4 p-4 rounded-2xl transition-all text-gray-400 font-bold relative">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                    <span class="text-sm">Audit Logs</span>
                </button>
                <a href="../docs/index.html" target="_blank" class="nav-link w-full flex items-center gap-4 p-4 rounded-2xl transition-all text-gray-400 font-bold relative hover:bg-white/5">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2Z"/><path d="M8 42h3V6"/><path d="M12 42h3V6"/></svg>
                    <span class="text-sm">Documentation</span>
                </a>
            </nav>

            <div class="px-6 mt-8 flex-1 overflow-y-auto custom-scrollbar">
                <div class="flex items-center justify-between mb-6 px-2">
                    <p class="text-[10px] uppercase tracking-[0.2em] text-gray-600 font-black">Hosts</p>
                    <button id="add-host-btn" data-action="add-host" class="w-6 h-6 rounded-lg bg-blue-500/10 hover:bg-blue-500/20 text-blue-500 flex items-center justify-center transition-all cursor-pointer">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                </div>
                <div id="host-list" class="space-y-2"></div>
            </div>

            <div class="p-6">
                <button id="logout-btn" class="w-full flex items-center justify-center gap-3 p-4 rounded-2xl bg-red-500/5 text-red-400 hover:bg-red-500/10 transition-all text-sm font-bold border border-red-500/10">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></svg>
                    SAIR DO SISTEMA
                </button>
            </div>
        </aside>
        

        <!-- Main Content -->
        <main class="flex-1 flex flex-col min-w-0 bg-transparent overflow-hidden">
            <!-- Header -->
            <header class="h-24 flex items-center justify-between px-6 lg:px-12 sticky top-0 z-40">
                <div class="flex items-center gap-6">
                    <button id="toggle-sidebar" class="lg:hidden w-12 h-12 flex items-center justify-center bg-white/5 hover:bg-white/10 rounded-2xl border border-white/5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></svg>
                    </button>
                        <div>
                            <h2 id="view-title" class="text-2xl font-extrabold text-white tracking-tight">Dashboard</h2>
                            <div class="flex items-center gap-4 mt-0.5">
                                <div class="flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-blue-500"></span>
                                    <span id="sync-time" class="text-[10px] text-gray-500 font-bold font-mono tracking-widest uppercase">SYNC: --:--</span>
                                </div>
                                <div class="flex items-center gap-2">
                                    <span class="w-1.5 h-1.5 rounded-full bg-amber-500"></span>
                                    <span id="session-countdown" class="text-[10px] text-amber-500/80 font-bold font-mono tracking-widest uppercase">SESSION: 15:00</span>
                                </div>
                            </div>
                        </div>
                </div>
                
                <div class="flex items-center gap-4 lg:gap-8">
                    <div class="hidden sm:flex items-center gap-1.5 bg-white/[0.03] border border-white/5 px-4 py-2 rounded-2xl backdrop-blur-md">
                        <div class="flex items-center gap-3 pr-4 border-r border-white/10">
                            <div class="w-2 h-2 rounded-full bg-green-500"></div>
                            <div class="flex flex-col">
                                <span class="text-[8px] uppercase font-black text-gray-500 tracking-tighter">MySQL</span>
                                <span class="text-[10px] font-bold text-green-400">ACTIVE</span>
                            </div>
                        </div>
                        <div class="flex items-center gap-3 pl-2">
                            <div class="w-2 h-2 rounded-full bg-orange-500"></div>
                            <div class="flex flex-col">
                                <span class="text-[8px] uppercase font-black text-gray-500 tracking-tighter">Firebase</span>
                                <span class="text-[10px] font-bold text-orange-400">CLOUD</span>
                            </div>
                        </div>
                    </div>

                    <div class="flex items-center gap-4 lg:gap-6 border-l border-white/10 pl-6 lg:pl-10">
                        <button id="manual-sync" class="w-10 h-10 flex items-center justify-center rounded-xl bg-white/5 hover:bg-white/10 text-gray-400 hover:text-blue-400 transition-all border border-white/5" title="Manual Sync">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                        </button>
                        <button id="wol-all-btn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-green-500/10 hover:bg-green-500/20 text-green-400 hover:text-green-300 transition-all border border-green-500/20" title="Wake All Offline Hosts">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="M2 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="M12 22v-4"/><path d="m19.07 19.07-2.83-2.83"/><path d="M22 12h-4"/><path d="m19.07 4.93-2.83 2.83"/></svg>
                        </button>
                        <button id="shutdown-all-btn" class="w-10 h-10 flex items-center justify-center rounded-xl bg-red-500/10 hover:bg-red-500/20 text-red-400 hover:text-red-300 transition-all border border-red-500/20" title="Shutdown All Hosts">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18.36 6.64a9 9 0 1 1-12.73 0"/><line x1="12" x2="12" y1="2" y2="12"/></svg>
                        </button>
                        <div class="hidden md:flex flex-col text-right">
                            <span class="text-xs font-black text-white tracking-tight">ADMIN</span>
                            <span class="text-[9px] font-bold text-blue-500 tracking-[0.2em]">ROOT</span>
                        </div>
                        <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-blue-600 to-indigo-600 p-[1px] shadow-lg">
                            <div class="w-full h-full rounded-2xl bg-[#0a0a0a] flex items-center justify-center">
                                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                            </div>
                        </div>
                    </div>
                </div>
            </header>

            <div class="flex-1 overflow-y-auto overflow-x-hidden relative custom-scrollbar p-6 lg:p-12" id="content-container">
                <div id="skeleton-loader" class="hidden absolute inset-x-12 inset-y-0"></div>

                <section id="view-dashboard" class="page-view space-y-12">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6" id="kpi-grid"></div>
                    
                    <div class="grid grid-cols-1 xl:grid-cols-3 gap-10">
                        <div class="xl:col-span-2 glass-panel p-8 rounded-[2.5rem] shadow-2xl relative overflow-hidden">
                            <div class="flex items-center justify-between mb-10">
                                <div>
                                    <h3 class="font-extrabold text-xl text-white">Cluster Load</h3>
                                    <p class="text-xs font-bold text-gray-500 mt-1 uppercase tracking-widest">Real-time metrics</p>
                                </div>
                                <div class="flex items-center gap-2 px-4 py-2 bg-green-500/10 border border-green-500/20 rounded-2xl">
                                    <div class="w-2 h-2 rounded-full bg-green-400 animate-pulse"></div>
                                    <span class="text-[10px] font-black text-green-400 uppercase tracking-tighter">LIVE</span>
                                </div>
                            </div>
                            <div class="h-[300px]">
                                <canvas id="mainChart"></canvas>
                            </div>
                        </div>
                        
                        <div class="glass-panel p-8 rounded-[2.5rem] flex flex-col shadow-2xl relative overflow-hidden">
                            <div class="flex items-center justify-between mb-8">
                                <h3 class="font-extrabold text-xl text-white">Recent Events</h3>
                                <div class="w-10 h-10 rounded-xl bg-white/5 flex items-center justify-center">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                                </div>
                            </div>
                            <div id="log-feed" class="flex-1 space-y-2 overflow-y-auto pr-2 custom-scrollbar"></div>
                        </div>
                    </div>
                </section>

                <section id="view-audit" class="page-view hidden space-y-8 opacity-0 translate-y-8">
                    <div id="audit-logs-container"></div>
                </section>

                <section id="view-host-detail" class="page-view hidden space-y-12 opacity-0 scale-95"></section>
            </div>
        </main>
    </div>

    <div id="toast-container" class="fixed bottom-10 right-10 z-[100] space-y-4"></div>

    <!-- Botão Flutuante (FAB) -->
    <button data-action="add-host" class="fixed right-8 w-16 h-16 bg-blue-600 hover:bg-blue-500 text-white rounded-full shadow-[0_10px_40px_rgba(37,99,235,0.5)] flex items-center justify-center transition-all hover:scale-110 active:scale-95 z-[300] cursor-pointer pointer-events-auto group">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" class="pointer-events-none transition-transform group-hover:rotate-90"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>

    <!-- Painel Flutuante Lateral (Slide-over) -->
    <div id="host-modal" class="fixed inset-0 z-[400] hidden opacity-0 transition-all duration-500">
        <div id="modal-backdrop" class="absolute inset-0 bg-black/60 backdrop-blur-md cursor-pointer"></div>
        
        <div id="modal-content" class="absolute right-0 top-0 bottom-0 w-full max-w-md bg-[#0a0a0a] border-l border-white/10 shadow-[-20px_0_60px_rgba(0,0,0,0.5)] translate-x-full transition-transform duration-500 pointer-events-auto flex flex-col">
            <div class="p-8 border-b border-white/5 flex items-center justify-between bg-gradient-to-r from-blue-600/10 to-transparent">
                <div>
                    <h3 id="host-modal-title" class="text-2xl font-black text-white tracking-tight">Add New Host</h3>
                    <p class="text-[10px] text-blue-500 font-bold uppercase tracking-[0.2em] mt-1">Infrastructure Management</p>
                </div>
                <button data-action="close-modal" class="w-12 h-12 flex items-center justify-center rounded-2xl bg-white/5 hover:bg-white/10 text-gray-400 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
                </button>
            </div>

            <form id="host-form" class="flex-1 overflow-y-auto p-8 space-y-8 custom-scrollbar">
                <input type="hidden" id="host-id">
                
                <div class="space-y-6">
                    <div class="relative group">
                        <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1 mb-2 block transition-colors group-focus-within:text-blue-500">Identification</label>
                        <input type="text" id="host-name" required placeholder="Ex: LAB-SRV-01" 
                            class="w-full bg-white/[0.03] border border-white/10 rounded-2xl px-6 py-4 text-sm focus:border-blue-500 focus:bg-white/5 outline-none transition-all text-white placeholder:text-gray-700">
                    </div>

                    <div class="grid grid-cols-1 gap-6">
                        <div class="relative group">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1 mb-2 block">Network Address (IP)</label>
                            <input type="text" id="host-ip" required placeholder="192.168.1.XX" 
                                class="w-full bg-white/[0.03] border border-white/10 rounded-2xl px-6 py-4 text-sm font-mono focus:border-blue-500 focus:bg-white/5 outline-none transition-all text-white">
                        </div>
                        <div class="relative group">
                            <label class="text-[10px] font-black text-gray-500 uppercase tracking-widest ml-1 mb-2 block">Physical Address (MAC)</label>
                            <input type="text" id="host-mac" placeholder="00:00:00:00:00:00" 
                                class="w-full bg-white/[0.03] border border-white/10 rounded-2xl px-6 py-4 text-sm font-mono focus:border-blue-500 focus:bg-white/5 outline-none transition-all text-white">
                        </div>
                    </div>
                </div>
            </form>

            <div class="p-8 bg-white/[0.01] border-t border-white/5 flex flex-col gap-4">
                <button type="submit" form="host-form" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-900/20 transition-all active:scale-[0.98] uppercase tracking-widest text-xs">
                    Confirm & Register Host
                </button>
                <button type="button" id="delete-host-btn" class="hidden w-full bg-red-500/10 hover:bg-red-500/20 text-red-500 font-bold py-4 rounded-2xl transition-all text-xs uppercase tracking-widest">
                    Remove Host from System
                </button>
            </div>
        </div>
    </div>

    <script src="vendor/chart.js"></script>
    <script type="module" src="app.js"></script>
</body>
</html>
